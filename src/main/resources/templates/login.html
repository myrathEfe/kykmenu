<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Giriş Yap')}"></head>
<body class="login-page">
<main class="container py-5">
    <div class="login-theme-toggle">
        <button type="button" class="theme-toggle theme-toggle--login" id="themeToggle" aria-label="Temayı değiştir">
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3c0 5 3.79 8.79 8.79 8.79z"></path>
                </svg>
            </span>
            <span class="theme-toggle__track" aria-hidden="true">
                <span class="theme-toggle__thumb"></span>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path>
                </svg>
            </span>
            <span class="visually-hidden">Tema değiştir</span>
        </button>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card border-0 shadow-lg login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <span class="eyebrow">KYK YEMEKHANE MENÜ TAKİP SİSTEMİ</span>
                        <h1 class="h3 fw-bold mt-2 mb-2">Hoş geldin</h1>
                        <p class="text-secondary mb-0">Menüleri görüntülemek ve yönetmek için hesabınla giriş yap.</p>
                    </div>

                    <div class="alert alert-warning" th:if="${warningMessage}" th:text="${warningMessage}"></div>
                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:action="@{/login}" th:object="${loginRequest}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="username">Kullanıcı Adı</label>
                            <input id="username" type="text" class="form-control" th:field="*{username}" placeholder="Örn: admin">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password">Şifre</label>
                            <input id="password" type="password" class="form-control" th:field="*{password}" placeholder="Şifrenizi girin">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                    </form>

                    <div class="demo-box mt-4">
                        <p class="mb-2 fw-semibold">Örnek kullanıcılar</p>
                        <p class="mb-1 small"><strong>Admin:</strong> admin / admin123</p>
                        <p class="mb-0 small"><strong>User:</strong> user / user123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
