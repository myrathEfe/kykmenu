<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Hata')}"></head>
<body class="app-shell">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <span class="eyebrow">HATA SAYFASI</span>
                    <div class="display-4 fw-bold mt-2" th:text="${statusCode}">500</div>
                    <h1 class="h3 fw-bold mt-3" th:text="${errorTitle}">Hata</h1>
                    <p class="text-secondary mb-4" th:text="${errorMessage}">Bir hata oluştu.</p>
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <a th:href="@{/dashboard}" class="btn btn-primary">Dashboard'a Dön</a>
                        <a th:href="@{/menus}" class="btn btn-outline-secondary">Menülere Git</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
