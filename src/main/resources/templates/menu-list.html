<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Menüler')}"></head>
<body class="app-shell">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <span class="eyebrow">MENÜ LİSTESİ</span>
            <h1 class="h2 fw-bold mb-1">Günlük menü kayıtları</h1>
            <p class="text-secondary mb-0">Tarih, öğün türü, ana yemek ve kalori aralığına göre filtreleme yapabilirsin.</p>
        </div>
        <a th:if="${currentRole != null and currentRole.name() == 'ADMIN'}" th:href="@{/menus/new}" class="btn btn-primary">Yeni Menü Ekle</a>
    </section>

    <section class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form th:action="@{/menus}" th:object="${search}" method="get" class="row g-3">
                <div class="col-md-6 col-lg-2">
                    <label class="form-label" for="date">Tarih</label>
                    <input id="date" type="date" class="form-control" th:field="*{date}">
                </div>
                <div class="col-md-6 col-lg-2">
                    <label class="form-label" for="mealType">Öğün Türü</label>
                    <select id="mealType" class="form-select" th:field="*{mealType}">
                        <option value="">Tümü</option>
                        <option th:each="mealType : ${mealTypes}" th:value="${mealType}" th:text="${mealType}"></option>
                    </select>
                </div>
                <div class="col-md-6 col-lg-3">
                    <label class="form-label" for="mainDish">Ana Yemek</label>
                    <input id="mainDish" type="text" class="form-control" th:field="*{mainDish}" placeholder="Örn: Tavuk">
                </div>
                <div class="col-md-3 col-lg-2">
                    <label class="form-label" for="minCalories">Min Kalori</label>
                    <input id="minCalories" type="number" class="form-control" th:field="*{minCalories}" min="0" placeholder="0">
                </div>
                <div class="col-md-3 col-lg-2">
                    <label class="form-label" for="maxCalories">Max Kalori</label>
                    <input id="maxCalories" type="number" class="form-control" th:field="*{maxCalories}" min="0" placeholder="1200">
                </div>
                <div class="col-lg-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Ara</button>
                </div>
                <div class="col-12">
                    <a th:href="@{/menus}" class="btn btn-link px-0">Filtreleri temizle</a>
                </div>
            </form>
        </div>
    </section>

    <section class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(menus)}" class="empty-state m-4">
                Arama kriterlerine uygun menü bulunamadı.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(menus)}">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Tarih</th>
                        <th>Öğün</th>
                        <th>Ana Yemek</th>
                        <th>Kalori</th>
                        <th>Görsel</th>
                        <th class="text-end">İşlemler</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="menu : ${menus}">
                        <td th:text="${#temporals.format(menu.date, 'dd.MM.yyyy')}">01.01.2026</td>
                        <td><span class="badge rounded-pill text-bg-secondary" th:text="${menu.mealType}">OGLE</span></td>
                        <td>
                            <div class="fw-semibold" th:text="${menu.mainDish}">Ana yemek</div>
                            <div class="small text-secondary" th:text="${menu.soup != null ? menu.soup : 'Çorba bilgisi yok'}">Çorba</div>
                        </td>
                        <td th:text="${menu.calories} + ' kcal'">0 kcal</td>
                        <td>
                            <img th:if="${menu.imageData != null}" th:src="@{/menus/image/{id}(id=${menu.id})}" class="menu-thumb" alt="Menü görseli">
                            <span th:if="${menu.imageData == null}" class="text-secondary small">Yok</span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-outline-primary btn-sm" th:href="@{/menus/{id}(id=${menu.id})}">Detay</a>
                            <a th:if="${currentRole != null and currentRole.name() == 'ADMIN'}" class="btn btn-outline-secondary btn-sm" th:href="@{/menus/{id}/edit(id=${menu.id})}">Düzenle</a>
                            <form th:if="${currentRole != null and currentRole.name() == 'ADMIN'}" th:action="@{/menus/{id}/delete(id=${menu.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Bu menü kaydını silmek istediğinize emin misiniz?')">Sil</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>
</body>
</html>
