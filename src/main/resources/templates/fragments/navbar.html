<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="navbar">
<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">KYK Menü Sistemi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/menus}">Menüler</a>
                </li>
                <li class="nav-item" th:if="${currentRole != null and currentRole.name() == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/menus/new}">Yeni Menü</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3 text-white" th:if="${authenticated}">
                <span class="small">
                    <strong th:text="${currentUsername}">kullanici</strong>
                    <span class="badge text-bg-light ms-2" th:text="${currentRole}">USER</span>
                </span>
                <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Çıkış Yap</a>
            </div>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</th:block>
